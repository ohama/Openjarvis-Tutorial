[book]
title = "OpenJarvis Tutorial"
authors = ["ohama"]
language = "ko"
description = "Apple Silicon(M4 Max)에서 로컬 Qwen(122B/35B) + LiteLLM으로 OpenJarvis를 구축·운용하는 실전 튜토리얼"
src = "."

[build]
build-dir = "docs"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ohama/Openjarvis-Tutorial"
edit-url-template = "https://github.com/ohama/Openjarvis-Tutorial/edit/master/{path}"

[output.html.search]
enable = true
limit-results = 30
boost-title = 2
boost-hierarchy = 1
